<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pdf-parse - Test Reports</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 60px;
      max-width: 600px;
      width: 100%;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 2.5em;
    }
    .subtitle {
      color: #666;
      margin-bottom: 40px;
      font-size: 1.1em;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    a {
      display: flex;
      align-items: center;
      padding: 20px 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-size: 1.2em;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }
    .icon {
      margin-right: 15px;
      font-size: 1.5em;
    }
    .footer {
      margin-top: 40px;
      text-align: center;
      color: #999;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 pdf-parse</h1>
    <p class="subtitle">Test & Coverage Reports</p>
    <div class="links">
      <a href="./reports/test/">
        <span class="icon">🧪</span>
        <span>Test Results</span>
      </a>
      <a href="./reports/coverage/">
        <span class="icon">📈</span>
        <span>Coverage Report</span>
      </a>
    </div>
    <div class="footer">
      <p>Generated by GitHub Actions</p>
    </div>
  </div>
</body>
</html>
